<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event RSVP | EVORA</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>📝</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
        .logo { width: 60px; height: 60px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 16px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; }
        h1 { color: #111827; font-size: 26px; margin-bottom: 8px; font-weight: 800; }
        p { color: #6b7280; font-size: 15px; margin-bottom: 24px; line-height: 1.5; }
        .input-group { margin-bottom: 16px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        input { width: 100%; padding: 14px 16px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 16px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #667eea; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: transform 0.1s, opacity 0.2s; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        button:active:not(:disabled) { transform: scale(0.98); }
        .loading { display: none; color: #667eea; font-weight: 600; margin-top: 20px; }
        .error { color: #ef4444; background: #fee2e2; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
        .success { color: #059669; background: #ecfdf5; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
        #event-name { color: #667eea; font-weight: 700; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ccc; border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <div class="logo">🎉</div>
        <h1>You're Invited!</h1>
        <p>Please enter your details to RSVP for <br><strong id="event-name">Loading event...</strong></p>

        <div id="error-box" class="error"></div>
        <div id="success-box" class="success" style="display: none;">✅ RSVP Submitted! Generating your pass...</div>

        <form id="rsvp-form">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="e.g. Rahul Sharma" required autocomplete="name">
            </div>
            
            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="e.g. +91 9876543210" required autocomplete="tel">
            </div>

            <button type="submit" id="submit-btn" class="submit-button">Get My Digital Pass</button>
            <div id="loading-text" class="loading"><span class="spinner"></span>Generating your pass...</div>
        </form>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCHB-2Qde78kQmDbRD1KD6L8vdbtXafGfM",
            authDomain: "online-voting-system-76856.firebaseapp.com",
            projectId: "online-voting-system-76856",
            storageBucket: "online-voting-system-76856.appspot.com",
            messagingSenderId: "107763524926",
            appId: "1:107763524926:web:49cd23b80017f2670af86f",
            measurementId: "G-HQFTPBYTFH"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Get Event ID from URL (e.g., rsvp.html?event=123)
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('event');
        const errorBox = document.getElementById('error-box');
        const successBox = document.getElementById('success-box');

        if (!eventId) {
            document.getElementById('main-card').innerHTML = '<div class="logo">❌</div><h1>Invalid Link</h1><p>Event ID is missing. Please ask the host for the correct RSVP link.</p>';
        } else {
            // Fetch Event Name to display
            db.collection("userEvents").doc(eventId).get().then((doc) => {
                if (doc.exists) {
                    const eventData = doc.data();
                    document.getElementById('event-name').innerText = eventData.title || eventData.eventName || "the event";
                } else {
                    document.getElementById('event-name').innerText = "Unknown Event";
                }
            }).catch(e => {
                console.log("Error fetching event:", e);
                document.getElementById('event-name').innerText = "the event";
            });
        }

        // Handle Form Submission
        document.getElementById('rsvp-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const submitBtn = document.getElementById('submit-btn');
            const loadingText = document.getElementById('loading-text');

            if (!eventId) {
                errorBox.innerText = "Event ID is missing. Please check the URL.";
                errorBox.style.display = 'block';
                return;
            }

            if (!name || !phone) {
                errorBox.innerText = "Please fill in all fields.";
                errorBox.style.display = 'block';
                return;
            }

            // Show loading state
            submitBtn.style.display = 'none';
            submitBtn.disabled = true;
            loadingText.style.display = 'block';
            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            try {
                // Save to Firestore - userEvents/{eventId}/guests
                const docRef = await db.collection('userEvents').doc(eventId).collection('guests').add({
                    name: name,
                    phone: phone,
                    email: '',
                    isVIP: false,
                    status: 'pending',
                    source: 'rsvp_link',
                    rsvpDate: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                console.log("Guest added with ID:", docRef.id);
                
                // Show success message
                successBox.style.display = 'block';
                
                // Wait 1.5 seconds, then redirect to their ticket page
                setTimeout(() => {
                    window.location.href = `ticket.html?event=${eventId}&guest=${docRef.id}`;
                }, 1500);
                
            } catch (err) {
                console.error("Error saving guest:", err);
                submitBtn.style.display = 'block';
                submitBtn.disabled = false;
                loadingText.style.display = 'none';
                errorBox.innerText = "❌ " + (err.message || "Error saving your RSVP. Please try again.");
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
